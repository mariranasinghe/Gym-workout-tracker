kind = "mobile"
previewPath = "/mobile/"
title = "GymTrack Mobile"
version = "1.0.0"
id = "artifacts/gymtrack-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 25166

[services.development]
run = "pnpm --filter @workspace/gymtrack-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gymtrack-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/gymtrack-mobile", "run", "serve" ]

[services.env]
PORT = "25166"
BASE_PATH = "/mobile/"
