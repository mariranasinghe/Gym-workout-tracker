kind = "web"
previewPath = "/"
title = "GymTrack - Workout Tracker"
version = "1.0.0"
id = "artifacts/gymtrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22111

[services.development]
run = "pnpm --filter @workspace/gymtrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gymtrack", "run", "build" ]
publicDir = "artifacts/gymtrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22111"
BASE_PATH = "/"
